# REMOVED: This test H2 configuration was intentionally removed to enforce MySQL-only usage.
# If you need database-backed unit tests, create a MySQL-based test profile or
# an isolated testcontainer configuration (recommended).

# Test configuration: disable DataSource/Flyway auto-configuration so unit tests don't require a DB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
spring.sql.init.mode=never
spring.flyway.enabled=false

# JWT used in tests
jwt.secret=TestJwtSecretForUnitTestsDontUseInProd0123456789
jwt.expiration=3600000

# Logging
logging.level.org.springframework.jdbc=ERROR