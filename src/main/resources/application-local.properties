# Application Name
spring.application.name=dayflow-hrms

# Server Configuration
server.port=8080

# MySQL Database Configuration (matches V1 SQL script which creates database 'odoo')
spring.datasource.url=jdbc:mysql://localhost:3306/odoo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=odoo_admin
spring.datasource.password=Odoo@2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.initialization-mode=never

# Disable Flyway at startup for now to avoid Unsupported Database error
spring.flyway.enabled=false

# Logging
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.dayflow.hrms=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.odoo.hackathon.hrms.security=DEBUG