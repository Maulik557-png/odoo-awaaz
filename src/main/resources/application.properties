spring.application.name=human-resource-management-system

# Activate local profile by default so application-local.properties (MySQL) is used
spring.profiles.active=local

server.port=8080

# Disable any JPA/Hibernate properties - this project uses plain JDBC and SQL scripts for schema/data.
# If you previously relied on Hibernate, convert entity logic to JDBC templates or SQL queries.
# Keep SQL initialization off to allow Flyway to manage migrations.
spring.sql.init.mode=never

# Logging - keep moderately verbose
logging.level.org.springframework.jdbc=DEBUG